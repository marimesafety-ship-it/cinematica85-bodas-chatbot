<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinemática 85 Bodas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #FAF6F0;
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #7A1F3D;
      padding: 18px 24px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.6rem;
      color: #fff;
      letter-spacing: 0.03em;
    }

    header p {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 1rem;
      color: rgba(255,255,255,0.78);
      margin-top: 2px;
      letter-spacing: 0.04em;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .bubble-wrap {
      display: flex;
      max-width: 100%;
    }

    .bubble-wrap.user  { justify-content: flex-end; }
    .bubble-wrap.bot   { justify-content: flex-start; }

    .bubble {
      max-width: min(72%, 520px);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.user {
      background: #C9A66B;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      background: #fff;
      border: 1px solid #E8DCC8;
      color: #2c2c2c;
      border-bottom-left-radius: 4px;
    }

    /* markdown inside bot bubbles */
    .bubble.bot p  { margin-bottom: 0.5em; }
    .bubble.bot p:last-child { margin-bottom: 0; }
    .bubble.bot ul, .bubble.bot ol { padding-left: 1.2em; margin-bottom: 0.5em; }
    .bubble.bot strong { font-weight: 700; }

    /* typing indicator */
    .typing span {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin: 0 2px;
      background: #C9A66B;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 14px 16px;
      background: #FAF6F0;
      border-top: 1px solid #E8DCC8;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1px solid #E8DCC8;
      border-radius: 12px;
      padding: 11px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      color: #2c2c2c;
      background: #fff;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #user-input:focus {
      border-color: #C9A66B;
    }

    #send-btn {
      flex-shrink: 0;
      background: #7A1F3D;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 11px 20px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      height: 44px;
      align-self: flex-end;
    }

    #send-btn:hover:not(:disabled) { background: #5e1830; }
    #send-btn:disabled { opacity: 0.55; cursor: default; }

    /* ── Scrollbar ── */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #E8DCC8; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <h1>Cinemática 85 Bodas</h1>
    <p>Tu boda, contada con cine</p>
  </header>

  <div id="messages"></div>

  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="Escribe tu mensaje…" autocomplete="off"></textarea>
    <button id="send-btn">Enviar</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');

    const historial = [];

    marked.setOptions({ breaks: true });

    function addBubble(role, html, isMarkdown) {
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap ${role}`;
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}`;
      if (isMarkdown) {
        bubble.innerHTML = marked.parse(html);
      } else {
        bubble.textContent = html;
      }
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function showTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'bubble-wrap bot';
      wrap.id = 'typing-indicator';
      const bubble = document.createElement('div');
      bubble.className = 'bubble bot typing';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addBubble('user', text, false);
      historial.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ historial }),
        });

        const data = await res.json();
        removeTyping();

        if (data.respuesta) {
          historial.push({ role: 'assistant', content: data.respuesta });
          addBubble('bot', data.respuesta, true);
        } else {
          addBubble('bot', 'Ha ocurrido un error. Por favor, inténtalo de nuevo.', false);
        }
      } catch {
        removeTyping();
        addBubble('bot', 'No hemos podido conectar. Comprueba tu conexión e inténtalo de nuevo.', false);
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    /* Auto-resize textarea */
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    /* Send on Enter, newline on Shift+Enter */
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    /* Welcome message */
    addBubble('bot', 'Hola, somos Cinemática 85. Cuéntanos sobre vuestra boda y os ayudamos con lo que necesitéis', false);
  </script>

</body>
</html>
